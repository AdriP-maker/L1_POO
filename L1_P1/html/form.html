<!-- Script subtotal en tiempo real -->
<script>
    const precios = {
        sandwich_jamon: 2.25,
        sandwich_pollo: 4.00,
        cafe: 1.00,
        jugo: 2.00,
        brownie: 1.50,
        galleta: 1.20,
        pie: 2.00
    };

    function calcularSubtotal() {
        let total = 0;
        for (const [id, precio] of Object.entries(precios)) {
            const cant = parseInt(document.getElementById(id).value) || 0;
            total += cant * precio;
        }
        document.getElementById('subtotal').textContent = '$' + total.toFixed(2);
    }

    // Escucha cambios en todos los inputs de cantidad
    document.querySelectorAll('.input-cantidad').forEach(input => {
        input.addEventListener('input', calcularSubtotal);
    });
</script>
